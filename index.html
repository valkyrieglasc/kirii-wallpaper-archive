<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirii's Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="site-grid" aria-hidden="true"></div>

    <main class="shell">
        <header class="hero">
            <p class="eyebrow">// 📂 | ~/home/kirii/archive</p>
            <h1>// Wallpapers Archive</h1>
            <p class="subtext">-- <strong>PLEASE READ THE NOTE BEFORE CONTINUE !!!</strong> --</p>
            <div class="toolbar">
                <label class="search" for="searchInput">
                    <span class="icon">⌕</span>
                    <italic><input id="searchInput" type="text" placeholder="search archive" autocomplete="off">
                </label>
                <div class="column-control">
                    <label for="columnRange">Cols</label>
                    <input id="columnRange" type="range" min="1" max="6" value="3">
                    <span id="columnValue" class="column-value">3</span>
                </div>
            </div>
        </header>
        <div class="grid" id="gallery"></div>
    </main>

    <footer class="site-footer">
        <div class="site-footer__block">
            <span class="site-footer__label">// contact:</span>
            <p>[</p>
            <a href="mailto:kirii@example.com">gmail</a>
            <p>]———[</p>
            <a href="https://www.instagram.com/kirii_ins" target="_blank" rel="noreferrer">instagram</a>
            <p>]———[</p>
            <a href="https://github.com/valkyrieglasc/kirii-wallpaper-archive.git" target="_blank" rel="noreferrer">github-repo</a>
            <p>]</p>
        </div>
    </footer>

    <div class="note-window" id="noteWindow">
        <div class="note-header" id="noteHeader">
            <div class="note-title">// 🗒️ Note</div>
            <div class="note-actions">
                <button id="minimizeNote" type="button">─</button>
            </div>
        </div>
        <div class="note-body" id="noteBody"></div>
    </div>

    <button class="note-bubble" id="noteBubble" type="button">☰</button>
    <button class="scroll-top" id="scrollTopButton" type="button" aria-label="Back to top">⤒</button>

    <div class="preview-backdrop" id="previewBackdrop" aria-hidden="true"></div>
    <div class="preview-overlay" id="previewOverlay" aria-hidden="true">
        <img id="previewImage" src="" alt="">
        <span class="preview-caption" id="previewCaption"></span>
    </div>
    <div class="preview-hint" id="previewHint" aria-hidden="true">// click again to close the previewed image ~</div>
    <div class="custom-cursor" id="customCursor" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
